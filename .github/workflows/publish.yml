name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Check package version tag
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedTag = `v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;

          if (actualTag !== expectedTag) {
            console.error(`Release tag ${actualTag} does not match package version ${pkg.version}. Expected ${expectedTag}.`);
            process.exit(1);
          }
          NODE

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck
        env:
          CI: "true"

      - name: Test
        run: pnpm test
        env:
          CI: "true"

      - name: Build
        run: pnpm build
        env:
          CI: "true"

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: "true"

      - name: Verify npm package
        run: npm publish --dry-run --access public

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package version tag
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedTag = `v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;

          if (actualTag !== expectedTag) {
            console.error(`Release tag ${actualTag} does not match package version ${pkg.version}. Expected ${expectedTag}.`);
            process.exit(1);
          }
          NODE

      - name: Build
        run: pnpm build
        env:
          CI: "true"

      - name: Publish to npm with token
        if: env.NPM_TOKEN != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Publish to npm with trusted publishing
        if: env.NPM_TOKEN == ''
        run: npm publish --access public
